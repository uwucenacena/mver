<!DOCTYPE html>
<html>
<head>
<title>MVER - Editors</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    color:white;

    background:url('mver-bg.png') no-repeat center center fixed;
    background-size:cover;
}

/* DARK OVERLAY LIKE MVER STYLE */
body::before{
    content:"";
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.35);
    z-index:-1;
}

/* TITLE */
.title{
    text-align:center;
    font-size:28px;
    margin-top:30px;
    letter-spacing:2px;
}

/* CENTER CONTAINER */
.leaderboard{
    width:520px;
    margin:30px auto;
}

/* CARD */
.card{
    background:#0b1a3a;
    border:2px solid #1f4fff;
    border-radius:10px;

    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:10px 12px;
    margin:10px 0;
}

/* LEFT SIDE */
.left{
    display:flex;
    align-items:center;
    gap:10px;
}

/* RANK BOX (#1 etc) */
.rank{
    background:#1f4fff;
    padding:6px 10px;
    border-radius:6px;
    font-weight:bold;
    color:white;
}

/* NAME */
.name{
    font-weight:bold;
}

/* RIGHT SIDE */
.right{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:12px;
    opacity:0.9;
}

/* PROFILE BUTTON */
.profile-btn{
    background:#1e293b;
    color:white;
    border:none;
    padding:6px 10px;
    border-radius:6px;
    cursor:pointer;
}

/* TIER BADGES */
.tier{
    padding:6px 10px;
    border-radius:6px;
    font-weight:bold;
    min-width:32px;
    text-align:center;
}

/* COLORS (LIKE IMAGE) */
.Aminus{ background:#7CFF4D; color:black; }
.Bplus{ background:#FFD84D; color:black; }
.B{ background:#FFB000; color:black; }
.Bminus{ background:#FF9A3D; color:black; }
.Cplus{ background:#FF7A00; color:black; }
.C{ background:#FF4D00; color:white; }
.Cminus{ background:#FF2E2E; color:white; }

</style>
</head>
